<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デウス・コード 八百万の神託</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN', 'MS Gothic', 'ＭＳ ゴシック', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a1a 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            display: block;
            background: #0a0a1a;
            border: 3px solid #0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: #0ff;
            text-shadow: 0 0 20px #0ff;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="loading">LOADING...</div>
        <canvas id="gameCanvas" width="1200" height="750"></canvas>
    </div>

    <!-- ===== 読み込み順 = 依存順（constants → state → data → systems → render → main） ===== -->
    <!-- 基盤 -->
    <script src="src/constants.js"></script>
    <script src="src/util.js"></script>
    <script src="src/assets.js"></script>
    <!-- データ -->
    <script src="src/data/skills.js"></script>
    <script src="src/data/items.js"></script>
    <script src="src/data/enemies.js"></script>
    <script src="src/data/characters.js"></script>
    <script src="src/data/shops.js"></script>
    <script src="src/data/maps.js"></script>
    <script src="src/data/chapters.js"></script>
    <script src="src/data/cutscenes.js"></script>
    <!-- 状態・セーブ -->
    <script src="src/state.js"></script>
    <script src="src/save.js"></script>
    <!-- システム（純ロジック） -->
    <script src="src/systems/cutscene.js"></script>
    <script src="src/systems/story.js"></script>
    <script src="src/systems/world.js"></script>
    <script src="src/systems/battle.js"></script>
    <script src="src/systems/menu.js"></script>
    <script src="src/systems/title.js"></script>
    <script src="src/systems/scene.js"></script>
    <!-- 描画（コーデックスが差し替える層） -->
    <script src="src/render/common.render.js"></script>
    <script src="src/render/cutscene.render.js"></script>
    <script src="src/render/world.render.js"></script>
    <script src="src/render/battle.render.js"></script>
    <script src="src/render/menu.render.js"></script>
    <!-- 入力・ループ -->
    <script src="src/input.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
